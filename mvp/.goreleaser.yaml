version: 2

project_name: agentic-worktrees

before:
  hooks:
  - go mod tidy

builds:
- id: agentic-worktrees
  main: ./cmd
  binary: agentic-worktrees
  env:
  - CGO_ENABLED=0
  goos:
  - linux
  - darwin
  goarch:
  - amd64
  - arm64

archives:
- id: default
  formats: [ tar.gz ]
  name_template: >-
    {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ .Version }}-next"

changelog:
  use: git
