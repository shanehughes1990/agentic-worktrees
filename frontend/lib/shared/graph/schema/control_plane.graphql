enum JobKind {
  INGESTION_AGENT_RUN
  AGENT_WORKFLOW_RUN
  SCM_WORKFLOW_RUN
}

type SessionSummary {
  runID: String!
  taskCount: Int!
  jobCount: Int!
  updatedAt: Time!
}

type SessionsSuccess {
  sessions: [SessionSummary!]!
}

union SessionsResult = SessionsSuccess | GraphError

type SessionSuccess {
  session: SessionSummary!
}

union SessionResult = SessionSuccess | GraphError

type WorkflowJob {
  runID: String!
  taskID: String!
  jobID: String!
  projectID: String!
  jobKind: JobKind!
  idempotencyKey: String!
  queueTaskID: String!
  queue: String!
  status: String!
  duplicate: Boolean!
  enqueuedAt: Time!
  updatedAt: Time!
}

type WorkflowJobsSuccess {
  jobs: [WorkflowJob!]!
}

union WorkflowJobsResult = WorkflowJobsSuccess | GraphError

type ExecutionHistoryRecord {
  runID: String!
  taskID: String!
  jobID: String!
  projectID: String!
  jobKind: JobKind!
  idempotencyKey: String!
  step: String!
  status: String!
  errorMessage: String
  updatedAt: Time!
}

type ExecutionHistorySuccess {
  records: [ExecutionHistoryRecord!]!
}

union ExecutionHistoryResult = ExecutionHistorySuccess | GraphError

type DeadLetterHistoryRecord {
  queue: String!
  taskID: String!
  jobKind: JobKind!
  action: String!
  lastError: String
  reason: String
  actor: String
  occurredAt: Time!
}

type DeadLetterHistorySuccess {
  records: [DeadLetterHistoryRecord!]!
}

union DeadLetterHistoryResult = DeadLetterHistorySuccess | GraphError

enum TrackerSourceKind {
  INTERNAL
  GITHUB_ISSUES
}

input IngestionBoardSourceInput {
  boardID: String!
  kind: TrackerSourceKind!
  location: String
  appliesToAllRepositories: Boolean!
  repositoryIDs: [String!]
}

input EnqueueIngestionWorkflowInput {
  runID: String!
  taskID: String!
  jobID: String!
  idempotencyKey: String!
  prompt: String!
  projectID: String!
  workflowID: String!
  boardSources: [IngestionBoardSourceInput!]!
}

type EnqueueIngestionWorkflowSuccess {
  queueTaskID: ID!
  duplicate: Boolean!
}

union EnqueueIngestionWorkflowResult = EnqueueIngestionWorkflowSuccess | GraphError

input ApproveIssueIntakeInput {
  runID: String!
  taskID: String!
  jobID: String!
  projectID: String!
  source: String!
  issueReference: String!
  approvedBy: String!
}

type ApproveIssueIntakeSuccess {
  decision: SupervisorDecision!
}

union ApproveIssueIntakeResult = ApproveIssueIntakeSuccess | GraphError

input RequeueDeadLetterInput {
  queue: String!
  taskID: String!
}

type RequeueDeadLetterSuccess {
  ok: Boolean!
}

union RequeueDeadLetterResult = RequeueDeadLetterSuccess | GraphError

type ProjectRepository {
  repositoryID: String!
  scmID: String!
  repositoryURL: String!
  isPrimary: Boolean!
}

type ProjectSCM {
  scmID: String!
  scmProvider: SCMProvider!
}

type ProjectBoard {
  boardID: String!
  trackerProvider: TrackerSourceKind!
  taskboardName: String
  appliesToAllRepositories: Boolean!
  repositoryIDs: [String!]!
}

type ProjectSetup {
  projectID: String!
  projectName: String!
  scms: [ProjectSCM!]!
  repositories: [ProjectRepository!]!
  boards: [ProjectBoard!]!
  createdAt: Time!
  updatedAt: Time!
}

type ProjectSetupsSuccess {
  projects: [ProjectSetup!]!
}

union ProjectSetupsResult = ProjectSetupsSuccess | GraphError

type ProjectSetupSuccess {
  project: ProjectSetup!
}

union ProjectSetupResult = ProjectSetupSuccess | GraphError

input ProjectRepositoryInput {
  repositoryID: String!
  scmID: String!
  repositoryURL: String!
  isPrimary: Boolean!
}

input ProjectSCMInput {
  scmID: String!
  scmProvider: SCMProvider!
  scmToken: String!
}

input ProjectBoardInput {
  trackerProvider: TrackerSourceKind!
  taskboardName: String
  appliesToAllRepositories: Boolean!
  repositoryIDs: [String!]
}

input UpsertProjectSetupInput {
  projectID: String!
  projectName: String!
  scms: [ProjectSCMInput!]!
  repositories: [ProjectRepositoryInput!]!
  boards: [ProjectBoardInput!]!
}

type UpsertProjectSetupSuccess {
  project: ProjectSetup!
}

union UpsertProjectSetupResult = UpsertProjectSetupSuccess | GraphError

enum StreamEventSource {
  ACP
  SESSION_FILE
  WORKER
}

type StreamEvent {
  eventID: ID!
  streamOffset: Int!
  occurredAt: Time!
  runID: String
  taskID: String
  jobID: String
  projectID: String
  sessionID: String
  correlationID: String!
  source: StreamEventSource!
  eventType: String!
  payload: String!
}

type StreamEventSuccess {
  event: StreamEvent!
}

union StreamEventResult = StreamEventSuccess | GraphError

type WorkerSession {
  workerID: String!
  epoch: Int!
  state: String!
  desiredState: String!
  lastHeartbeat: Time!
  leaseExpiresAt: Time!
  rogueReason: String
  updatedAt: Time!
}

type WorkerSessionsSuccess {
  sessions: [WorkerSession!]!
}

union WorkerSessionsResult = WorkerSessionsSuccess | GraphError

type WorkerSettings {
  heartbeatIntervalSeconds: Int!
  responseDeadlineSeconds: Int!
  staleAfterSeconds: Int!
  drainTimeoutSeconds: Int!
  terminateTimeoutSeconds: Int!
  rogueThreshold: Int!
  updatedAt: Time!
}

type WorkerSettingsSuccess {
  settings: WorkerSettings!
}

union WorkerSettingsResult = WorkerSettingsSuccess | GraphError

input UpdateWorkerSettingsInput {
  heartbeatIntervalSeconds: Int!
  responseDeadlineSeconds: Int!
  staleAfterSeconds: Int!
  drainTimeoutSeconds: Int!
  terminateTimeoutSeconds: Int!
  rogueThreshold: Int!
}

extend type Query {
  sessions(limit: Int = 50): SessionsResult!
  session(runID: String!): SessionResult!
  workflowJobs(runID: String!, taskID: String, limit: Int = 100): WorkflowJobsResult!
  executionHistory(correlation: SupervisorCorrelationInput!, limit: Int = 100): ExecutionHistoryResult!
  deadLetterHistory(queue: String, limit: Int = 100): DeadLetterHistoryResult!
  projectSetups(limit: Int = 50): ProjectSetupsResult!
  projectSetup(projectID: String!): ProjectSetupResult!
  workerSessions(limit: Int = 100): WorkerSessionsResult!
  workerSettings: WorkerSettingsResult!
}

extend type Mutation {
  enqueueIngestionWorkflow(input: EnqueueIngestionWorkflowInput!): EnqueueIngestionWorkflowResult!
  approveIssueIntake(input: ApproveIssueIntakeInput!): ApproveIssueIntakeResult!
  requeueDeadLetter(input: RequeueDeadLetterInput!): RequeueDeadLetterResult!
  upsertProjectSetup(input: UpsertProjectSetupInput!): UpsertProjectSetupResult!
  updateWorkerSettings(input: UpdateWorkerSettingsInput!): WorkerSettingsResult!
}

extend type Subscription {
  sessionActivityStream(correlation: SupervisorCorrelationInput!, fromOffset: Int = 0): StreamEventResult!
  workflowExecutionStream(correlation: SupervisorCorrelationInput!, fromOffset: Int = 0): StreamEventResult!
  agentOutputStream(correlation: SupervisorCorrelationInput!, fromOffset: Int = 0): StreamEventResult!
  workerSessionStream(correlation: SupervisorCorrelationInput!, fromOffset: Int = 0): StreamEventResult!
}
