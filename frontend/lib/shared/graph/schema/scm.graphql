enum SCMOperation {
  SOURCE_STATE
  ENSURE_WORKTREE
  SYNC_WORKTREE
  CLEANUP_WORKTREE
  ENSURE_BRANCH
  SYNC_BRANCH
  UPSERT_PULL_REQUEST
  GET_PULL_REQUEST
  SUBMIT_REVIEW
  CHECK_MERGE_READINESS
  MERGE_PULL_REQUEST
}

enum SCMProvider {
  GITHUB
}

enum SCMMergeMethod {
  MERGE
  SQUASH
  REBASE
}

enum SCMReviewDecision {
  APPROVE
  REQUEST_CHANGES
  COMMENT
}

type ScmSupportedOperationsSuccess {
  operations: [SCMOperation!]!
}

union ScmSupportedOperationsResult = ScmSupportedOperationsSuccess | GraphError

extend type Query {
  scmSupportedOperations: ScmSupportedOperationsResult!
}
