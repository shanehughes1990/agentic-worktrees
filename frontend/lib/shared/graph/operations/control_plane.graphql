subscription SessionActivity($runID: String!, $taskID: String!, $jobID: String!, $fromOffset: Int!) {
  sessionActivityStream(
    correlation: {runID: $runID, taskID: $taskID, jobID: $jobID}
    fromOffset: $fromOffset
  ) {
    __typename
    ... on StreamEventSuccess {
      event {
        eventID
        eventType
        source
        payload
        occurredAt
      }
    }
    ... on GraphError {
      code
      message
      field
    }
  }
}
