services:
  postgres:
    image: postgres:16-alpine
    container_name: agentic-worktrees-postgres
    environment:
      POSTGRES_DB: agentic_orchestrator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agentic_orchestrator"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: agentic-worktrees-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: agentic-worktrees-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_PORT: 8080
      DATABASE_DSN: postgres://postgres:postgres@postgres:5432/agentic_orchestrator?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: debug
      SHUTDOWN_TIMEOUT: 15s
      HEALTH_LIVE_PATH: /live
      HEALTH_READY_PATH: /ready
      OTEL_DEPLOYMENT_ENVIRONMENT: local
      OTEL_SERVICE_NAME: agentic-api
      REMOTE_STORAGE_TYPE: gcs
      REMOTE_STORAGE_BUCKET_PREFIX: projects
      GOOGLE_CLOUD_STORAGE_BUCKET: ${GOOGLE_CLOUD_STORAGE_BUCKET}
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/google-application-credentials.json
      GOOGLE_CDN_BASE_URL: ${GOOGLE_CDN_BASE_URL}
      GOOGLE_CDN_KEY_NAME: ${GOOGLE_CDN_KEY_NAME}
      GOOGLE_CDN_KEY_VALUE: ${GOOGLE_CDN_KEY_VALUE}
    volumes:
      - type: bind
        source: ${GOOGLE_APPLICATION_CREDENTIALS}
        target: /run/secrets/google-application-credentials.json
        read_only: true
    ports:
      - "8080:8080"
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
      args:
        GH_CLI_APK_VERSION: ${GH_CLI_APK_VERSION:-}
        COPILOT_CLI_VERSION: ${COPILOT_CLI_VERSION:-0.0.421}
    deploy:
      replicas: 1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_PORT: 8081
      DATABASE_DSN: postgres://postgres:postgres@postgres:5432/agentic_orchestrator?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: debug
      SHUTDOWN_TIMEOUT: 15s
      HEALTH_LIVE_PATH: /live
      HEALTH_READY_PATH: /ready
      OTEL_DEPLOYMENT_ENVIRONMENT: local
      OTEL_SERVICE_NAME: agentic-worker
      REMOTE_STORAGE_TYPE: gcs
      REMOTE_STORAGE_BUCKET_PREFIX: projects
      GOOGLE_CLOUD_STORAGE_BUCKET: ${GOOGLE_CLOUD_STORAGE_BUCKET}
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/google-application-credentials.json
      GOOGLE_CDN_BASE_URL: ${GOOGLE_CDN_BASE_URL}
      GOOGLE_CDN_KEY_NAME: ${GOOGLE_CDN_KEY_NAME}
      GOOGLE_CDN_KEY_VALUE: ${GOOGLE_CDN_KEY_VALUE}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    volumes:
      - type: bind
        source: ${GOOGLE_APPLICATION_CREDENTIALS}
        target: /run/secrets/google-application-credentials.json
        read_only: true
    expose:
      - "8081"
    restart: unless-stopped

  asynqmon:
    image: hibiken/asynqmon:latest
    platform: linux/amd64
    container_name: agentic-worktrees-asynqmon
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8085:8080"
    command: ["--redis-addr=redis:6379"]
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
