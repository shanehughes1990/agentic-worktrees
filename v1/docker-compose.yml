services:
  postgres:
    image: postgres:16-alpine
    container_name: agentic-worktrees-postgres
    environment:
      POSTGRES_DB: agentic_orchestrator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agentic_orchestrator"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: agentic-worktrees-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: agentic-worktrees-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: local
      API_PORT: 8080
      DATABASE_DSN: postgres://postgres:postgres@postgres:5432/agentic_orchestrator?sslmode=disable
      TASK_ENGINE_REDIS_ADDRESS: redis:6379
      SCM_GITHUB_TOKEN: ${SCM_GITHUB_TOKEN:-dummy-token}
    ports:
      - "8080:8080"
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    container_name: agentic-worktrees-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: local
      WORKER_PORT: 8081
      DATABASE_DSN: postgres://postgres:postgres@postgres:5432/agentic_orchestrator?sslmode=disable
      TASK_ENGINE_REDIS_ADDRESS: redis:6379
      SCM_GITHUB_TOKEN: ${SCM_GITHUB_TOKEN:-dummy-token}
    ports:
      - "8081:8081"
    restart: unless-stopped

  asynqmon:
    image: hibiken/asynqmon:latest
    platform: linux/amd64
    container_name: agentic-worktrees-asynqmon
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8085:8080"
    command: ["--redis-addr=redis:6379"]
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
