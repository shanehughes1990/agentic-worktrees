root = "."
testdata_dir = "testdata"
tmp_dir = "tmp/air-worker"

[build]
cmd = "go build -o ./tmp/air-worker/bin/worker ./cmd/worker"
bin = "./tmp/air-worker/bin/worker"
full_bin = "./tmp/air-worker/bin/worker"
include_ext = ["go", "mod", "sum", "yaml", "yml", "json", "graphql"]
exclude_dir = ["tmp", "vendor", "docs/forensics", "frontend", "mvp", ".git"]
include_dir = ["cmd", "internal"]
exclude_file = []
exclude_regex = ["_test\\.go"]
exclude_unchanged = true
follow_symlink = true
log = "air-worker-build.log"
stop_on_error = true
poll = false
poll_interval = 0

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[log]
time = true

[misc]
clean_on_exit = true
