schema:
- internal/interface/graphql/schema/**/*.graphqls

exec:
  package: graph
  layout: single-file
  filename: internal/interface/graphql/graph/generated.go

model:
  filename: internal/interface/graphql/models/model_gen.go
  package: models

resolver:
  package: resolvers
  layout: follow-schema
  dir: internal/interface/graphql/resolvers
  filename_template: "{name}_resolver.go"

call_argument_directives_with_null: true

autobind: []

models:
  ID:
    model:
    - github.com/99designs/gqlgen/graphql.ID
    - github.com/99designs/gqlgen/graphql.Int
    - github.com/99designs/gqlgen/graphql.Int64
    - github.com/99designs/gqlgen/graphql.Int32
  UUID:
    model:
    - github.com/99designs/gqlgen/graphql.UUID
  Int:
    model:
    - github.com/99designs/gqlgen/graphql.Int32
  Int64:
    model:
    - github.com/99designs/gqlgen/graphql.Int
    - github.com/99designs/gqlgen/graphql.Int64
  Time:
    model:
    - github.com/99designs/gqlgen/graphql.Time
