root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/agentic-worktrees ./cmd/agentic-worktrees"
bin = "./tmp/agentic-worktrees"
full_bin = "./tmp/agentic-worktrees"
include_ext = ["go", "tpl", "tmpl", "html", "yaml", "yml", "json"]
exclude_dir = ["tmp", "vendor", "docs", ".git", ".worktrees"]
delay = 200
stop_on_error = true

[log]
time = true

[color]
main = "cyan"
watcher = "yellow"
build = "green"
runner = "magenta"

[misc]
clean_on_exit = true
