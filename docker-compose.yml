name: agentic-worktrees

services:
  redis:
    image: redis:7.4-alpine
    container_name: agentic-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    profiles: ["app"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentic-app
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_ADDR: redis:6379
      APP_ENV: production
    command: ["/app/bin/agentic-worktrees"]

  app-dev:
    profiles: ["dev"]
    image: golang:1.25-alpine
    container_name: agentic-app-dev
    working_dir: /workspace
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_ADDR: redis:6379
      APP_ENV: development
      CGO_ENABLED: "0"
    volumes:
      - ./:/workspace
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    command:
      - sh
      - -c
      - |
        apk add --no-cache git curl && \
        go install github.com/air-verse/air@latest && \
        air -c .air.toml

volumes:
  redis_data:
  go_mod_cache:
  go_build_cache:
